<script type="text/javascript">
//<![CDATA[
/*
PDF GENERATOR (FAST REWRITTEN VERSION)
----------------------------------------
Downloads wiki pages concurrently inside a Web Worker
Formats them Kindle-style
Builds a beautifully structured printable PDF booklet
*/

var API = "https://genshin-impact.fandom.com/api.php";

var statusText = document.getElementById("status");
var speedometer = document.getElementById("speedometer");
var content = document.getElementById("content");
var downloadButton = document.getElementById("downloadButton");
var consoleLog = document.getElementById("consoleLog");
var clearConsoleBtn = document.getElementById("clearConsoleBtn");
var contentGeneratorUi = document.getElementById("content-generator-ui");

// Single global parser instance to prevent memory leaks and GC lag
var globalDOMParser = new DOMParser();

// Map of lowercased page title -> internal anchors
var titleMap = {};

// Source code for the background Web Worker task
var workerBlobCode = `
    var pages = [];
    var maxConcurrency = 1000;
    var API = "";
    var completedCount = 0;
    var errorCount = 0;
    var queue = [];
    var failedIndices = [];
    var activeConnections = 0;

    function log(message, logType) {
        self.postMessage({ type: 'log', message: message, logType: logType || 'info' });
    }

    self.onmessage = function(e) {
        var data = e.data;
        if (data.type === 'start') {
            pages = data.pages;
            maxConcurrency = data.maxConcurrency;
            API = data.API;
            completedCount = 0;
            errorCount = 0;
            failedIndices = [];
            queue = Array.from({ length: pages.length }, function(_, i) { return i; });
            activeConnections = 0;

            log("Background worker thread initialized. Concurrency cap: " + maxConcurrency, "info");
            
            var startingCount = Math.min(maxConcurrency, queue.length);
            for (var w = 0; w < startingCount; w++) {
                launchNext();
            }
        } else if (data.type === 'retry') {
            log("Worker thread received retry instruction for " + failedIndices.length + " items.", "info");
            queue = failedIndices.slice();
            failedIndices = [];
            errorCount = 0;
            
            // Adjust completedCount back so that progress represents correctly
            completedCount = pages.length - queue.length;
            
            var startingCount = Math.min(maxConcurrency, queue.length);
            for (var w = 0; w < startingCount; w++) {
                launchNext();
            }
        }
    };

    function launchNext() {
        if (queue.length === 0) {
            if (activeConnections === 0) {
                self.postMessage({
                    type: 'complete',
                    completedCount: completedCount,
                    errorCount: errorCount,
                    failedIndices: failedIndices
                });
            }
            return;
        }

        var taskIndex = queue.shift();
        var title = pages[taskIndex];
        activeConnections++;

        loadPageInWorker(title, taskIndex);
    }

    function loadPageInWorker(title, taskIndex, retries) {
        if (typeof retries === 'undefined') retries = 3;

        var url = API + "?origin=*" + "&action=parse" + "&page=" + encodeURIComponent(title) + "&prop=text" + "&format=json";
        
        var controller = new AbortController();
        var timeoutId = setTimeout(function() {
            controller.abort();
        }, 12000);

        fetch(url, { signal: controller.signal })
            .then(function(res) {
                clearTimeout(timeoutId);
                if (res.status === 429 && retries > 0) {
                    var delay = 1000 * (4 - retries);
                    log("Rate limited (429) on '" + title + "'. Retrying in " + delay + "ms...", "warn");
                    setTimeout(function() {
                        loadPageInWorker(title, taskIndex, retries - 1);
                    }, delay);
                    return;
                }
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.json();
            })
            .then(function(data) {
                if (!data) return;
                if (!data.parse) {
                    throw new Error("Parse missing");
                }
                var html = data.parse.text["*"];
                
                completedCount++;
                activeConnections--;

                self.postMessage({
                    type: 'page_done',
                    index: taskIndex,
                    title: title,
                    html: html,
                    completedCount: completedCount,
                    errorCount: errorCount
                });

                launchNext();
            })
            .catch(function(err) {
                clearTimeout(timeoutId);
                var isTimeout = err.name === 'AbortError';
                var errorMsg = isTimeout ? "Request timed out (12s)" : err.message;

                if (retries > 0) {
                    var retryDelay = isTimeout ? 500 : 1000;
                    log("Error fetching '" + title + "' (" + errorMsg + "). Retrying in " + retryDelay + "ms...", "warn");
                    setTimeout(function() {
                        loadPageInWorker(title, taskIndex, retries - 1);
                    }, retryDelay);
                } else {
                    completedCount++;
                    errorCount++;
                    activeConnections--;
                    failedIndices.push(taskIndex);

                    log("Failed permanently to load '" + title + "' (" + errorMsg + ")", "error");

                    self.postMessage({
                        type: 'page_failed',
                        index: taskIndex,
                        title: title,
                        error: errorMsg,
                        completedCount: completedCount,
                        errorCount: errorCount
                    });

                    launchNext();
                }
            });
    }
`;

/* =========================
   LOGGING CONSOLE UTILS
========================= */

function logToConsole(message, type) {
    var typeClass = "log-info";
    if (type === "success") typeClass = "log-success";
    if (type === "warn") typeClass = "log-warn";
    if (type === "error") typeClass = "log-error";

    var item = document.createElement("div");
    item.className = "log-item " + typeClass;
    
    var timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
    item.textContent = "[" + timestamp + "] " + message;
    
    consoleLog.appendChild(item);
    
    // Prune logs if they get too long to preserve DOM performance
    if (consoleLog.children.length > 100) {
        consoleLog.removeChild(consoleLog.firstChild);
    }
    
    // Auto-scroll to bottom
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

clearConsoleBtn.onclick = function() {
    consoleLog.innerHTML = "";
};

/* =========================
   CLEAN PAGE
========================= */

function cleanPage(root, stripImages){

    // Extract real images out of <noscript> blocks first (common in Fandom responsive lazy-loaders)
    var noscripts = root.getElementsByTagName("noscript");
    for (var i = noscripts.length - 1; i >= 0; i--) {
        var noscript = noscripts[i];
        var contentStr = noscript.textContent || noscript.innerHTML;
        if (contentStr && contentStr.indexOf("<img") !== -1) {
            var tempDiv = document.createElement("div");
            tempDiv.innerHTML = contentStr;
            var realImg = tempDiv.querySelector("img");
            if (realImg && noscript.parentNode) {
                noscript.parentNode.insertBefore(realImg, noscript);
            }
        }
        if (noscript.parentNode) {
            noscript.parentNode.removeChild(noscript);
        }
    }

    removeBySelector(root, ".mw-editsection");
    removeBySelector(root, ".toc");
    removeBySelector(root, ".navbox");
    removeBySelector(root, ".reflist");
    removeBySelector(root, ".reference");
    removeBySelector(root, "script");
    removeBySelector(root, "style");
    removeBySelector(root, ".portable-infobox");
    removeBySelector(root, ".tabber");
    removeBySelector(root, ".tabs");
    removeBySelector(root, ".gallery");
    removeBySelector(root, ".audio-button");
    removeBySelector(root, ".nomobile");
    removeBySelector(root, ".noprint");
    removeBySelector(root, ".mw-parser-output > aside");

    // Extract item names and reconstruct actual images properly
    var images = root.getElementsByTagName("img");
    var imgList = [];
    for (var i = 0; i < images.length; i++) {
        imgList.push(images[i]);
    }

    for (var i = 0; i < imgList.length; i++) {
        var img = imgList[i];
        
        // Bypass referrer security headers that prevent hotlinking Wikia assets
        img.setAttribute("referrerpolicy", "no-referrer");
        
        var altText = img.getAttribute("alt") || img.getAttribute("title") || "";
        
        // Clean common Fandom image prefixes and file extensions
        altText = altText.replace(/^Item\s+/i, "")
                         .replace(/\.(png|jpg|jpeg|gif|webp)$/i, "")
                         .trim();

        // Resolve image source URL (handling Fandom lazy-loading data-src)
        var src = img.getAttribute("data-src") || img.getAttribute("src") || "";
        
        // Clear out responsive attributes that override custom src rules
        img.removeAttribute("srcset");
        img.removeAttribute("data-srcset");

        if (src && !stripImages) {
            // Check if it's a transparent 1x1 base64 lazy placeholder and fallback to data-src if available
            if (src.indexOf("data:image") === 0 && img.getAttribute("data-src")) {
                src = img.getAttribute("data-src");
            }

            // Normalize URLs to fully qualified secure absolute paths
            if (src.indexOf("//") === 0) {
                src = "https:" + src;
            } else if (src.indexOf("/") === 0) {
                src = "https://genshin-impact.fandom.com" + src;
            }
            img.setAttribute("src", src);
            img.removeAttribute("data-src");
            
            // Apply strict dimension scaling on layout
            img.style.maxWidth = "100%";
            img.style.height = "auto";
            img.style.verticalAlign = "middle";
            img.style.display = "inline-block";
            
            // Constrain small item icons so they look inline
            var widthAttr = img.getAttribute("width");
            var heightAttr = img.getAttribute("height");
            if ((widthAttr && parseInt(widthAttr) <= 64) || (heightAttr && parseInt(heightAttr) <= 64) || src.indexOf("scale-to-width-down") !== -1) {
                img.style.maxHeight = "24px";
                img.style.width = "auto";
                img.style.marginRight = "4px";
            }
        } else {
            // If stripping images, remove element entirely
            if (img.parentNode) {
                img.parentNode.removeChild(img);
            }
        }

        if (altText && altText !== "") {
            // Append a readable text label next to the image as a caption/backup descriptor
            var textNode = document.createTextNode(" " + altText + " ");
            if (img.parentNode && !stripImages) {
                img.parentNode.insertBefore(textNode, img.nextSibling);
            } else if (root.contains(img)) { // Fallback text placement if img is stripped
                root.appendChild(textNode);
            }
        }
    }

    var links = root.getElementsByTagName("a");

    for(var i = 0; i < links.length; i++){

        var href = links[i].getAttribute("href");

        if(href && href.indexOf("/wiki/") === 0){

            // Separate the hash section (sub-anchor) if present
            var path = href.replace("/wiki/", "");
            var hashIndex = path.indexOf("#");
            var pagePart = hashIndex !== -1 ? path.substring(0, hashIndex) : path;
            var hashPart = hashIndex !== -1 ? path.substring(hashIndex) : "";

            var pageName = decodeURIComponent(pagePart).replace(/_/g, " ").trim();
            var lowerPageName = pageName.toLowerCase();

            // Check if page exists in our local compilation
            if(titleMap && titleMap[lowerPageName]){
                links[i].setAttribute(
                    "href",
                    "#" + titleMap[lowerPageName] + hashPart
                );
            } else {
                // If it doesn't exist locally, map to an absolute external web URL so the link remains functional
                links[i].setAttribute(
                    "href",
                    "https://genshin-impact.fandom.com/wiki/" + pagePart + hashPart
                );
            }

        }

    }

}

function removeBySelector(root, selector){

    if(!root.querySelectorAll){
        return;
    }

    var elements = root.querySelectorAll(selector);

    for(var i = elements.length - 1; i >= 0; i--){

        if(elements[i].parentNode){
            elements[i].parentNode.removeChild(elements[i]);
        }

    }

}

/* =========================
   GET ALL PAGE TITLES
========================= */

function getAllPages(callback){

    var pages = [];
    logToConsole("Initializing metadata retrieval from Wiki index...", "info");

    function loadBatch(apcontinue){

        var url =
            API +
            "?origin=*" +
            "&action=query" +
            "&list=allpages" +
            "&aplimit=500" +
            "&format=json";

        if(apcontinue){
            url += "&apcontinue=" + encodeURIComponent(apcontinue);
        }

        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if(data.query && data.query.allpages){
                    for(var i = 0; i < data.query.allpages.length; i++){
                        pages.push(data.query.allpages[i].title);
                    }
                }

                statusText.innerHTML = "Loaded page titles: " + pages.length;
                logToConsole("Retrieved title batch. Total so far: " + pages.length, "info");

                // Load batches continuously until apcontinue is no longer returned
                if(data["continue"] && data["continue"].apcontinue){
                    loadBatch(data["continue"].apcontinue);
                } else {
                    logToConsole("Finished index mapping. Total pages to download: " + pages.length, "success");
                    callback(null, pages);
                }
            })
            .catch(function(err) {
                logToConsole("Failed to load catalog index: " + err.message, "error");
                callback(err.message, null);
            });
    }

    loadBatch("");

}

/* =========================
   PDF PROGRESSIVE DOM ASSEMBLER (CRASH-PROOF & HYPER-FAST)
========================= */

function buildPDF(pagesData){
    statusText.innerHTML = "Assembling book database...";
    logToConsole("Starting Progressive PDF DOM Compiler.", "info");

    // Hide download/generator workspace UI
    contentGeneratorUi.style.display = "none";
    content.innerHTML = "";

    // 1. Build Compilation Dashboard with Assembly Loading Bar and Layout Speed-up Tools
    var controlPanel = document.createElement("div");
    controlPanel.className = "pdf-control-panel";
    
    var titleHeader = document.createElement("h2");
    titleHeader.style.marginTop = "0";
    titleHeader.textContent = "PDF Compiler Dashboard";
    
    var descText = document.createElement("p");
    descText.innerHTML = "Because compiling " + pagesData.length + " pages into a single PDF exceeds normal browser memory limits, you can select range presets to generate <strong>instant volume PDFs</strong> below.";

    // Volume Segmentation Controls (Allows split-second PDF compilations)
    var setupBox = document.createElement("div");
    setupBox.style.background = "#fff";
    setupBox.style.padding = "12px";
    setupBox.style.borderRadius = "4px";
    setupBox.style.border = "1px solid #ddd";
    setupBox.style.marginBottom = "15px";

    setupBox.innerHTML = 
        "<h4 style='margin-top:0; margin-bottom:8px; font-size:14px; text-transform:uppercase; color:#555;'>Speed Tuning Options</h4>" +
        "<div class='panel-row'>" +
            "<label><input type='checkbox' id='chkStripImages' checked='checked' /> Strip External Images (Recommended: Makes PDF generation 100x faster)</label>" +
        "</div>" +
        "<div class='panel-row'>" +
            "<span>Select Range: </span>" +
            "<select id='selVolumeRange' style='padding:4px; font-size:14px;'>" +
                "<option value='0-1000'>Volume 1 (Pages 1 - 1,000)</option>" +
                "<option value='1000-2000'>Volume 2 (Pages 1,001 - 2,000)</option>" +
                "<option value='2000-5000'>Volume 3 (Pages 2,001 - 5,000)</option>" +
                "<option value='0-5000'>Volume Max (Pages 1 - 5,000)</option>" +
                "<option value='custom'>Custom Page Range...</option>" +
            "</select>" +
            "<span id='customRangeSpan' style='display:none; margin-left: 10px;'>" +
                "Start Index: <input type='number' id='numStartRange' value='1' min='1' style='width:60px; padding:3px;' /> " +
                "End Index: <input type='number' id='numEndRange' value='500' min='1' style='width:60px; padding:3px;' />" +
            "</span>" +
        "</div>" +
        "<button id='btnStartAssembly' style='background:#2196f3; color:white; border:none; padding:8px 16px; font-size:14px; border-radius:3px; cursor:pointer; font-weight:bold; margin-top:5px;'>Apply & Start Compile</button>";

    controlPanel.appendChild(titleHeader);
    controlPanel.appendChild(descText);
    controlPanel.appendChild(setupBox);
    
    // Loading Bar DOM
    var assemblyBarContainer = document.createElement("div");
    assemblyBarContainer.id = "assemblyProgressContainer";
    assemblyBarContainer.style.width = "100%";
    assemblyBarContainer.style.background = "#e0e0e0";
    assemblyBarContainer.style.height = "16px";
    assemblyBarContainer.style.borderRadius = "8px";
    assemblyBarContainer.style.overflow = "hidden";
    assemblyBarContainer.style.marginBottom = "10px";
    assemblyBarContainer.style.display = "none"; // Shown when assembly starts

    var assemblyBar = document.createElement("div");
    assemblyBar.id = "assemblyProgressBar";
    assemblyBar.style.width = "0%";
    assemblyBar.style.background = "#2196f3";
    assemblyBar.style.height = "100%";
    assemblyBar.style.transition = "width 0.1s ease";
    
    assemblyBarContainer.appendChild(assemblyBar);

    var assemblyStatus = document.createElement("div");
    assemblyStatus.id = "assemblyStatusText";
    assemblyStatus.style.fontFamily = "monospace";
    assemblyStatus.style.fontSize = "14px";
    assemblyStatus.style.color = "#333";
    assemblyStatus.style.marginBottom = "15px";
    assemblyStatus.style.display = "none"; // Shown when assembly starts
    assemblyStatus.textContent = "Waiting for compile range selection...";

    // Print Actions
    var actionContainer = document.createElement("div");
    actionContainer.id = "printActionButtons";
    actionContainer.style.display = "none";
    actionContainer.style.marginTop = "15px";

    var triggerPrintBtn = document.createElement("button");
    triggerPrintBtn.textContent = "Open Print Dialogue / Save to PDF";
    triggerPrintBtn.style.background = "#4caf50";
    triggerPrintBtn.style.color = "white";
    triggerPrintBtn.style.border = "none";
    triggerPrintBtn.style.borderRadius = "3px";
    triggerPrintBtn.style.padding = "10px 20px";
    triggerPrintBtn.style.fontWeight = "bold";
    triggerPrintBtn.style.marginRight = "10px";

    var restartBtn = document.createElement("button");
    restartBtn.textContent = "Restart Generator";
    restartBtn.style.background = "#f44336";
    restartBtn.style.color = "white";
    restartBtn.style.border = "none";
    restartBtn.style.borderRadius = "3px";
    restartBtn.style.padding = "10px 20px";
    restartBtn.style.fontWeight = "bold";

    actionContainer.appendChild(triggerPrintBtn);
    actionContainer.appendChild(restartBtn);

    controlPanel.appendChild(assemblyBarContainer);
    controlPanel.appendChild(assemblyStatus);
    controlPanel.appendChild(actionContainer);

    content.appendChild(controlPanel);

    // Structural Print Document Container
    var bookContainer = document.createElement("div");
    bookContainer.id = "printable-book-container";
    content.appendChild(bookContainer);

    // DOM selectors inside dashboard
    var selVolumeRange = document.getElementById("selVolumeRange");
    var customRangeSpan = document.getElementById("customRangeSpan");
    var numStartRange = document.getElementById("numStartRange");
    var numEndRange = document.getElementById("numEndRange");
    var btnStartAssembly = document.getElementById("btnStartAssembly");
    var chkStripImages = document.getElementById("chkStripImages");

    selVolumeRange.onchange = function() {
        if (selVolumeRange.value === "custom") {
            customRangeSpan.style.display = "inline";
        } else {
            customRangeSpan.style.display = "none";
        }
    };

    // Setup action callbacks
    triggerPrintBtn.onclick = function() {
        window.print();
    };

    restartBtn.onclick = function() {
        content.innerHTML = "";
        contentGeneratorUi.style.display = "block";
        downloadButton.disabled = false;
        statusText.innerHTML = "Generator ready.";
    };

    // Apply & Start Progressive Compilation Loop on custom selected Range
    btnStartAssembly.onclick = function() {
        // Parse range coordinates
        var startIdx = 0;
        var endIdx = pagesData.length;
        var modeVal = selVolumeRange.value;

        if (modeVal === "custom") {
            startIdx = Math.max(0, parseInt(numStartRange.value) - 1);
            endIdx = Math.min(pagesData.length, parseInt(numEndRange.value));
        } else {
            var parts = modeVal.split("-");
            startIdx = parseInt(parts[0]);
            endIdx = Math.min(pagesData.length, parseInt(parts[1]));
        }

        if (startIdx >= endIdx) {
            alert("Error: Start range index cannot be equal to or greater than the end index.");
            return;
        }

        var shouldStrip = chkStripImages.checked;

        // Reset and show Compilation Progress Bars
        bookContainer.innerHTML = "";
        btnStartAssembly.disabled = true;
        assemblyBarContainer.style.display = "block";
        assemblyStatus.style.display = "block";
        actionContainer.style.display = "none";

        var currentIndex = startIdx;
        var totalToProcess = endIdx - startIdx;
        var chunkSize = 100;

        logToConsole("Starting progressive range compilation [Pages " + (startIdx + 1) + " to " + endIdx + "].", "info");

        function processBatch() {
            var limit = Math.min(currentIndex + chunkSize, endIdx);
            var fragment = document.createDocumentFragment();

            for (var i = currentIndex; i < limit; i++) {
                var item = pagesData[i];
                if (!item) continue;

                var article = document.createElement("div");
                article.className = "pdf-article";
                article.id = "page-anchor-" + i;

                var articleHeader = document.createElement("h1");
                articleHeader.textContent = item.title;

                var articleBody = document.createElement("div");
                
                // Reprocess clean text layout if we strip images
                if (shouldStrip) {
                    var tempCleanContainer = document.createElement("div");
                    tempCleanContainer.innerHTML = item.html;
                    cleanPage(tempCleanContainer, true);
                    articleBody.innerHTML = tempCleanContainer.innerHTML;
                } else {
                    articleBody.innerHTML = item.html;
                }

                article.appendChild(articleHeader);
                article.appendChild(articleBody);
                fragment.appendChild(article);
            }

            bookContainer.appendChild(fragment);
            currentIndex = limit;

            // Calculate progress ratios
            var processed = currentIndex - startIdx;
            var pct = ((processed / totalToProcess) * 100).toFixed(1);
            assemblyBar.style.width = pct + "%";
            assemblyStatus.textContent = "Compiling book volume: " + processed + " / " + totalToProcess + " pages parsed (" + pct + "%)";

            if (currentIndex < endIdx) {
                setTimeout(processBatch, 10);
            } else {
                // Compilation Complete
                assemblyStatus.textContent = "Volume compilation complete! Ready to save to device.";
                assemblyStatus.style.color = "green";
                assemblyStatus.style.fontWeight = "bold";
                assemblyBar.style.background = "#4caf50";
                
                actionContainer.style.display = "block";
                btnStartAssembly.disabled = false;
                logToConsole("Progressive assembly finished cleanly for selected volume.", "success");
                statusText.innerHTML = "Document Volume ready.";

                // Fire system print dialog automatically
                setTimeout(function() {
                    window.print();
                }, 500);
            }
        }

        processBatch();
    };
}

/* =========================
   DOWNLOAD ENTIRE WIKI
========================= */

function downloadWiki(){

    content.innerHTML = "";
    statusText.innerHTML = "Loading wiki index...";
    speedometer.innerHTML = "";
    downloadButton.disabled = true;
    logToConsole("Starting download routine...", "info");

    getAllPages(function(error, pages){

        if(error){
            statusText.innerHTML = error;
            downloadButton.disabled = false;
            return;
        }

        var results = new Array(pages.length);
        
        // Build the local page tracking map
        titleMap = {};
        for (var i = 0; i < pages.length; i++) {
            // map clean titles directly to structural page anchors for PDF jumps
            titleMap[pages[i].toLowerCase().trim()] = "page-anchor-" + i;
        }
        logToConsole("Generated page-link translation table for PDF cross-referencing.", "success");
        
        // Create an unthrottled background Web Worker
        var blob = new Blob([workerBlobCode], { type: 'application/javascript' });
        var worker = new Worker(URL.createObjectURL(blob));
        
        // Concurrency Tuning: 1000 simultaneous background streams
        var maxConcurrency = 1000; 
        var completedCount = 0;
        var errorCount = 0;
        var failedIndices = [];

        var startTime = Date.now();
        var lastCompletedCount = 0;
        var lastReportTime = startTime;

        // Speedometer loop (throttling is fine for UI, worker runs background at full speed!)
        var speedInterval = setInterval(function() {
            var now = Date.now();
            var duration = (now - lastReportTime) / 1000;
            var processed = completedCount - lastCompletedCount;
            var rps = (processed / duration).toFixed(1);
            
            speedometer.innerHTML = "Speed: " + rps + " pages/sec | Background Streams active";
            
            lastReportTime = now;
            lastCompletedCount = completedCount;
            
            if (completedCount === pages.length) {
                clearInterval(speedInterval);
            }
        }, 1000);

        // Render highly optimized virtualized Dashboard (O(1) DOM Footprint)
        var dashboard = document.createElement("div");
        dashboard.style.padding = "15px";
        dashboard.style.background = "#fafafa";
        dashboard.style.border = "1px solid #ddd";
        dashboard.style.borderRadius = "4px";
        dashboard.style.marginBottom = "20px";
        dashboard.style.fontFamily = "sans-serif";
        
        dashboard.innerHTML = 
            "<h3 style='margin-top:0; font-size:16px; color:#333;'>Download Progress Dashboard</h3>" +
            "<div style='width:100%; background:#e0e0e0; height:12px; border-radius:6px; overflow:hidden; margin-bottom:12px;'>" +
                "<div id='progressBar' style='width:0%; background:#4caf50; height:100%; transition: width 0.15s ease;'></div>" +
            "</div>" +
            "<div style='display:grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size:14px; font-family:monospace;'>" +
                "<div>Total Catalog: <span id='dashTotal' style='font-weight:bold;'>-</span></div>" +
                "<div>Downloaded: <span id='dashDownloaded' style='font-weight:bold; color:green;'>0</span></div>" +
                "<div>Active Threads: <span id='dashActive' style='font-weight:bold; color:#1a73e8;'>0</span></div>" +
                "<div>Failed Pages: <span id='dashErrors' style='font-weight:bold; color:red;'>0</span></div>" +
            "</div>" +
            "<div id='retryControlsContainer' style='margin-top: 15px; display: none; padding-top: 10px; border-top: 1px solid #eee;'>" +
                "<button id='retryFailedBtn' style='font-size:13px; padding:6px 12px; background:#f44336; color:white; border:none; border-radius:3px; cursor:pointer; font-weight:bold;'>Retry Failed Pages</button>" +
                "<button id='forceBuildBtn' style='font-size:13px; padding:6px 12px; margin-left:10px; background:#4caf50; color:white; border:none; border-radius:3px; cursor:pointer; font-weight:bold;'>Build PDF Anyway</button>" +
            "</div>" +
            "<h4 style='margin-bottom:6px; margin-top:14px; font-size:13px; color:#555;'>Live Feed (Last 10 Downloads)</h4>" +
            "<div id='liveFeed' style='font-size:12px; font-family:monospace; background:#fff; border:1px solid #eee; padding:8px; height:140px; overflow-y:auto; border-radius:3px;'></div>";
            
        content.appendChild(dashboard);

        var progressBar = document.getElementById("progressBar");
        var dashTotal = document.getElementById("dashTotal");
        var dashDownloaded = document.getElementById("dashDownloaded");
        var dashActive = document.getElementById("dashActive");
        var dashErrors = document.getElementById("dashErrors");
        var liveFeed = document.getElementById("liveFeed");
        var retryControlsContainer = document.getElementById("retryControlsContainer");
        var retryFailedBtn = document.getElementById("retryFailedBtn");
        var forceBuildBtn = document.getElementById("forceBuildBtn");

        dashTotal.textContent = pages.length;

        // Store a lightweight sliding array of the most recent 10 logs
        var feedItems = [];
        function pushToLiveFeed(title, status, index) {
            var badgeClass = status === "DONE" ? "badge-success" : "badge-error";
            var logHtml = "<div style='border-bottom:1px solid #f9f9f9; padding:2px 0; display:flex; justify-content:space-between;'>" +
                "<span><strong>#" + (index + 1) + "</strong> " + escapeHTML(title) + "</span>" +
                "<span class='status-badge " + badgeClass + "'>" + status + "</span>" +
                "</div>";
            
            feedItems.push(logHtml);
            if (feedItems.length > 10) {
                feedItems.shift(); // Keep only last 10
            }
            liveFeed.innerHTML = feedItems.join("");
            liveFeed.scrollTop = liveFeed.scrollHeight;
        }

        function updateUI() {
            var percent = ((completedCount / pages.length) * 100).toFixed(1);
            progressBar.style.width = percent + "%";
            dashDownloaded.textContent = completedCount;
            dashActive.textContent = Math.min(maxConcurrency, pages.length - completedCount);
            dashErrors.textContent = errorCount;
            
            statusText.innerHTML = "Downloading pages: " + completedCount + " / " + pages.length;
        }

        // Web Worker communications listener
        worker.onmessage = function(e) {
            var data = e.data;
            if (data.type === 'log') {
                logToConsole(data.message, data.logType);
            } else if (data.type === 'page_done') {
                var taskIndex = data.index;
                completedCount = data.completedCount;
                errorCount = data.errorCount;

                // Process DOM parsing, page cleaning, and serializing asynchronously on main thread
                var doc = globalDOMParser.parseFromString(data.html, "text/html");
                var body = doc.body;
                cleanPage(body, false); // Keep images by default for live result caches
                
                var serializer = new XMLSerializer();
                var xhtmlBodyStr = serializer.serializeToString(body);

                results[taskIndex] = {
                    title: data.title,
                    html: xhtmlBodyStr
                };

                pushToLiveFeed(data.title, "DONE", taskIndex);
                
                if (completedCount % 5 === 0 || completedCount === pages.length) {
                    updateUI();
                }
            } else if (data.type === 'page_failed') {
                var taskIndex = data.index;
                completedCount = data.completedCount;
                errorCount = data.errorCount;
                failedIndices.push(taskIndex);

                results[taskIndex] = {
                    title: data.title,
                    html: "<p class='error'>Failed to download content.</p>"
                };

                pushToLiveFeed(data.title, "FAILED", taskIndex);

                if (completedCount % 5 === 0 || completedCount === pages.length) {
                    updateUI();
                }
            } else if (data.type === 'complete') {
                updateUI();
                clearInterval(speedInterval);
                worker.terminate();

                if (errorCount > 0) {
                    logToConsole("Finished downloading with " + errorCount + " unresolved failures.", "warn");
                    statusText.innerHTML = "Downloads complete with some errors. Choose an action below:";
                    retryFailedBtn.textContent = "Retry " + errorCount + " Failed Pages";
                    retryControlsContainer.style.display = "block";
                } else {
                    var finalResults = results.filter(function(r) { return r !== undefined; });
                    logToConsole("All 100% downloads resolved. Generating printable book output...", "success");
                    buildPDF(finalResults);
                }
            }
        };

        // Retry logic setup
        retryFailedBtn.onclick = function() {
            retryControlsContainer.style.display = "none";
            logToConsole("Retrying " + failedIndices.length + " failed page downloads...", "info");

            // Re-adjust stats down to accommodate the re-queued items
            completedCount = pages.length - failedIndices.length;
            errorCount = 0;
            failedIndices = [];

            updateUI();

            // Notify Worker to run retry process
            worker.postMessage({ type: 'retry' });
        };

        // Proceed without retrying logic
        forceBuildBtn.onclick = function() {
            retryControlsContainer.style.display = "none";
            worker.terminate();
            var finalResults = results.filter(function(r) { return r !== undefined; });
            logToConsole("Forcing build. Compiling PDF booklet with placeholder blocks for missing pages...", "warn");
            buildPDF(finalResults);
        };

        // Trigger start in Worker thread
        worker.postMessage({
            type: 'start',
            pages: pages,
            maxConcurrency: maxConcurrency,
            API: API
        });

        updateUI();
    });

}

/* =========================
   UTILS
========================= */

function escapeHTML(text){

    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

}

/* =========================
   BUTTON
========================= */

downloadButton.onclick = function(){

    downloadWiki();

    return false;

};
